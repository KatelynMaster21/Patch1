name: RECOVERY

on:
  workflow_dispatch:
    inputs:
      RECOVERY_URL:
        description: 'RECOVERY URL'
        required: true
        default: 'https://files.catbox.moe/(RECOMMENDED)'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Out
      uses: actions/checkout@v4

    - name: Prepare the environment
      run: |
        set -euo pipefail
        sudo apt update
        sudo apt install -y git wget lz4 tar openssl python3 coreutils

    - name: Validate inputs
      run: |
        set -euo pipefail
        URL="$https://filebin.net/k0peejjdfgy6g3r0"
        
        if [[ -z "$URL" || "$URL" == "https://files.catbox.moe/(RECOMMENDED)" ]]; then
          echo "ERROR: Please provide a valid RECOVERY_URL (not the default placeholder)"
          exit 1
        fi
        
        echo "Recovery URL validated: $URL"

    - name: Fetch image from URL
      run: |
        set -euo pipefail
        URL="${{ github.event.inputs.RECOVERY_URL }}"
        
        echo "Downloading from: $URL"
        wget --timeout=30 "$URL" -O recovery.img
        
        echo "Downloaded recovery.img:"
        ls -lh recovery.img
        file recovery.img
        echo "Size (bytes): $(stat -c%s recovery.img)"
        
        # Verify file is not empty
        if [ ! -s recovery.img ]; then
          echo "ERROR: Downloaded file is empty"
          exit 1
        fi
        
        echo "First 512 bytes (hex):"
        hexdump -C -n 512 recovery.img

    - name: Verify required files exist
      run: |
        set -euo pipefail
        
        if [ ! -f script1.sh ]; then
          echo "ERROR: script1.sh not found in repository"
          ls -la
          exit 1
        fi
        
        if [ ! -f script2.sh ]; then
          echo "ERROR: script2.sh not found in repository"
          ls -la
          exit 1
        fi
        
        if [ ! -f phh.pem ]; then
          echo "ERROR: phh.pem not found in repository"
          ls -la
          exit 1
        fi
        
        echo "All required files verified"

    - name: Patch Process-1
      run: |
        set -euo pipefail
        chmod a+x script1.sh
        chmod a+x magiskboot || true
        
        echo "Running script1.sh..."
        ./script1.sh recovery.img
        
        if [ ! -f recovery.img ]; then
          echo "ERROR: script1.sh did not produce recovery.img"
          exit 1
        fi

    - name: Patch Process-2
      run: |
        set -euo pipefail
        chmod a+x script2.sh
        
        echo "Running script2.sh..."
        ./script2.sh

        # Detect which patched image script2.sh produced
        PATCHED_IMAGE=""
        if [ -f r-patched.img ]; then
          PATCHED_IMAGE="r-patched.img"
        elif [ -f recovery-patched.img ]; then
          PATCHED_IMAGE="recovery-patched.img"
        else
          echo "ERROR: patched image not found after script2.sh. Expected r-patched.img or recovery-patched.img."
          echo "Workspace listing:"
          ls -la
          exit 1
        fi

        echo "Using patched image: $PATCHED_IMAGE"

        # Install avbtool with pinned version for consistency
        pip3 install 'avbtool>=1.2.0'

        # Extract public key from certificate
        python3 -m avbtool extract_public_key --key phh.pem --output phh.pub.bin

        # Use the original recovery.img size for partition_size
        PART_SIZE=$(stat -c%s recovery.img)
        echo "Partition size (bytes): $PART_SIZE"

        # Add AVB hash footer
        python3 -m avbtool add_hash_footer \
          --partition_name recovery \
          --partition_size "$PART_SIZE" \
          --image "$PATCHED_IMAGE" \
          --key phh.pem \
          --algorithm SHA256_RSA4096

        # Create output directory and package
        mkdir -p output
        cp -f "$PATCHED_IMAGE" output/recovery.img
        
        cd output
        tar cvf fastbootd-recovery.tar recovery.img
        
        # Create proper md5 checksum file (not appending binary data)
        md5sum fastbootd-recovery.tar > fastbootd-recovery.tar.md5
        
        echo "Output files created:"
        ls -lh

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: output/fastbootd-recovery.tar*
        name: Patched-Recovery
        tag_name: ${{ github.run_id }}

    - name: Upload Artifacts (Backup)
      uses: actions/upload-artifact@v4
      with:
        name: recovery-artifacts
        path: output/
        retention-days: 30
