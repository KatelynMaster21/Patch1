name: RECOVERY

on:
  workflow_dispatch:
    inputs:
      RECOVERY_URL:
        description: 'Recovery image download URL (HTTP/HTTPS)'
        required: true
        default: 'https://files.catbox.moe/(RECOMMENDED)'
      RECOVERY_CHECKSUM:
        description: 'Optional SHA256 checksum for integrity verification'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

        - name: Prepare environment and install dependencies
      run: |
        set -euo pipefail
        echo "::group::Installing dependencies"
        sudo apt-get update
        sudo apt-get install -y \
          git wget lz4 tar openssl python3 python3-pip coreutils curl
        echo "::endgroup::"
        
        echo "::group::Installing Python tools"
        # Clone Android's avbtool from AOSP
        git clone https://android.googlesource.com/platform/external/avb /tmp/avb
        export PYTHONPATH="/tmp/avb:$PYTHONPATH"
        echo "::endgroup::"
        
        echo "::notice title=Environment::Environment prepared successfully"
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Prepare environment and install dependencies
          - name: Prepare environment and install dependencies
      run: |
        set -euo pipefail
        echo "::group::Installing dependencies"
        sudo apt-get update
        sudo apt-get install -y \
          git wget lz4 tar openssl python3 python3-pip coreutils curl
        echo "::endgroup::"
        
        echo "::group::Installing Python tools"
        # Clone Android's avbtool from AOSP
        git clone https://android.googlesource.com/platform/external/avb /tmp/avb
        export PYTHONPATH="/tmp/avb:$PYTHONPATH"
        echo "::endgroup::"
        
        echo "::notice title=Environment::Environment prepared successfully"
        set -euo pipefail
        echo "::group::Installing dependencies"
        sudo apt-get update
        sudo apt-get install -y \
          git wget lz4 tar openssl python3 python3-pip coreutils curl
        echo "::endgroup::"
        
        echo "::group::Installing Python tools"
        - name: Prepare environment and install dependencies
  run: |
    set -euo pipefail
    echo "::group::Installing dependencies"
    sudo apt-get update
    sudo apt-get install -y \
      git wget lz4 tar openssl python3 python3-pip coreutils curl
    echo "::endgroup::"
    
    echo "::group::Installing Python tools"
    # Clone Android's avbtool from AOSP
    git clone https://android.googlesource.com/platform/external/avb /tmp/avb
    export PYTHONPATH="/tmp/avb:$PYTHONPATH"
    echo "::endgroup::"
    
    echo "::notice title=Environment::Environment prepared successfully"
        echo "::endgroup::"
        
        echo "::notice title=Environment::Environment prepared successfully"

    - name: Validate workflow inputs
      run: |
        set -euo pipefail
        
        URL="${{ github.event.inputs.RECOVERY_URL }}"
        
        # Check for default placeholder
        if [[ "$URL" == "https://files.catbox.moe/(RECOMMENDED)" ]]; then
          echo "::error title=Invalid URL::Please provide a valid RECOVERY_URL - do not use the default placeholder value"
          exit 1
        fi
        
        # Validate URL format
        if ! [[ "$URL" =~ ^https?:// ]]; then
          echo "::error title=Invalid URL format::URL must start with http:// or https:// (got: $URL)"
          exit 1
        fi
        
        # Check if URL is reachable (HEAD request only)
        echo "::notice::Checking URL accessibility..."
        if ! curl -sI --max-time 10 "$URL" > /dev/null 2>&1; then
          echo "::warning title=URL Unreachable::URL may be unreachable, proceeding anyway..."
        else
          echo "::notice::✓ URL is accessible"
        fi
        
        echo "::notice title=Recovery URL Validated::$URL"

    - name: Download recovery image with retry
      run: |
        set -euo pipefail
        
        URL="${{ github.event.inputs.RECOVERY_URL }}"
        MAX_RETRIES=3
        RETRY_DELAY=5
        TIMEOUT=60
        OUTPUT_FILE="recovery.img"
        
        echo "::notice::Downloading recovery image from: $URL"
        
        for attempt in $(seq 1 $MAX_RETRIES); do
          echo "Attempt $attempt/$MAX_RETRIES..."
          
          if wget \
            --timeout=$TIMEOUT \
            --tries=1 \
            --retry-connrefused \
            -q --show-progress \
            "$URL" \
            -O "$OUTPUT_FILE" 2>&1; then
            echo "✓ Download successful"
            break
          elif [ $attempt -lt $MAX_RETRIES ]; then
            echo "⚠️  Download failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          else
            echo "::error::Download failed after $MAX_RETRIES attempts"
            exit 1
          fi
        done
        
        # Verify file is not empty
        if [ ! -s "$OUTPUT_FILE" ]; then
          echo "::error::Downloaded file is empty or corrupted"
          exit 1
        fi
        
        # Display file info
        echo "::group::Downloaded image details"
        ls -lh "$OUTPUT_FILE"
        file "$OUTPUT_FILE"
        SIZE_BYTES=$(stat -c%s "$OUTPUT_FILE")
        SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
        echo "Size: ${SIZE_MB}MB (${SIZE_BYTES} bytes)"
        echo "::endgroup::"
        
        # Verify checksum if provided
        CHECKSUM_INPUT="${{ github.event.inputs.RECOVERY_CHECKSUM }}"
        if [ -n "$CHECKSUM_INPUT" ]; then
          echo "::group::Checksum Verification"
          COMPUTED_CHECKSUM=$(sha256sum "$OUTPUT_FILE" | awk '{print $1}')
          if [ "$COMPUTED_CHECKSUM" = "$CHECKSUM_INPUT" ]; then
            echo "✓ Checksum verified: $COMPUTED_CHECKSUM"
          else
            echo "::error title=Checksum Mismatch::Expected: $CHECKSUM_INPUT | Got: $COMPUTED_CHECKSUM"
            exit 1
          fi
          echo "::endgroup::"
        fi
        
        # Display first 512 bytes for debugging
        echo "::group::File header (hex)"
        hexdump -C -n 512 "$OUTPUT_FILE" | head -20
        echo "::endgroup::"

    - name: Verify required files
      run: |
        set -euo pipefail
        
        REQUIRED_FILES=("script1.sh" "script2.sh" "phh.pem")
        MISSING_FILES=()
        
        for file in "${REQUIRED_FILES[@]}"; do
          if [ ! -f "$file" ]; then
            MISSING_FILES+=("$file")
          fi
        done
        
        if [ ${#MISSING_FILES[@]} -gt 0 ]; then
          echo "::error::Missing required files: ${MISSING_FILES[*]}"
          echo "Repository contents:"
          ls -la
          exit 1
        fi
        
        echo "::notice::✓ All required files verified: ${REQUIRED_FILES[*]}"

    - name: Patch Process - Stage 1
      run: |
        set -euo pipefail
        
        echo "::notice::Running patch stage 1..."
        chmod a+x script1.sh
        chmod a+x magiskboot || true
        
        if ! ./script1.sh recovery.img; then
          echo "::error::script1.sh execution failed"
          echo "Workspace listing:"
          ls -la
          exit 1
        fi
        
        if [ ! -f recovery.img ]; then
          echo "::error::script1.sh did not produce recovery.img"
          echo "Workspace listing:"
          ls -la
          exit 1
        fi
        
        echo "::notice::✓ Patch stage 1 completed"

    - name: Patch Process - Stage 2
      run: |
        set -euo pipefail
        
        echo "::notice::Running patch stage 2..."
        chmod a+x script2.sh
        
        if ! ./script2.sh; then
          echo "::error::script2.sh execution failed"
          exit 1
        fi
        
        # Detect which patched image was produced
        PATCHED_IMAGE=""
        if [ -f r-patched.img ]; then
          PATCHED_IMAGE="r-patched.img"
        elif [ -f recovery-patched.img ]; then
          PATCHED_IMAGE="recovery-patched.img"
        else
          echo "::error::Patched image not found after script2.sh"
          echo "Expected: r-patched.img or recovery-patched.img"
          echo "Workspace listing:"
          ls -la
          exit 1
        fi
        
        echo "::notice::✓ Patched image detected: $PATCHED_IMAGE"
        echo "PATCHED_IMAGE=$PATCHED_IMAGE" >> $GITHUB_ENV

    - name: Validate patched image
      run: |
        set -euo pipefail
        
        PATCHED_IMAGE="${{ env.PATCHED_IMAGE }}"
        ORIG_SIZE=$(stat -c%s recovery.img)
        PATCHED_SIZE=$(stat -c%s "$PATCHED_IMAGE")
        SIZE_DIFF=$(( (PATCHED_SIZE - ORIG_SIZE) * 100 / ORIG_SIZE ))
        
        echo "::group::Image size comparison"
        echo "Original size: $ORIG_SIZE bytes"
        echo "Patched size: $PATCHED_SIZE bytes"
        echo "Size change: $SIZE_DIFF%"
        echo "::endgroup::"
        
        # Warn if size changed drastically (but don't fail)
        if [ "$SIZE_DIFF" -lt -50 ] || [ "$SIZE_DIFF" -gt 50 ]; then
          echo "::warning title=Large Size Change::Size changed by $SIZE_DIFF% - verify patching succeeded"
        fi

    - name: Add AVB hash footer
      run: |
        set -euo pipefail
        
        PATCHED_IMAGE="${{ env.PATCHED_IMAGE }}"
        
        echo "::notice::Adding AVB hash footer to: $PATCHED_IMAGE"
        
        # Verify key file permissions
        if [ ! -r phh.pem ]; then
          echo "::error::Cannot read phh.pem"
          exit 1
        fi
        
        # Extract public key from certificate
        echo "::group::Extracting public key"
        if ! python3 -m avbtool extract_public_key \
          --key phh.pem \
          --output phh.pub.bin; then
          echo "::error::Failed to extract public key from phh.pem"
          exit 1
        fi
        echo "✓ Public key extracted"
        echo "::endgroup::"
        
        # Get original recovery.img size for partition_size
        if [ ! -f recovery.img ]; then
          echo "::error::Original recovery.img not found"
          exit 1
        fi
        
        PART_SIZE=$(stat -c%s recovery.img)
        echo "::notice::Partition size: ${PART_SIZE} bytes"
        
        # Add AVB hash footer
        echo "::group::Adding AVB hash footer"
        if ! python3 -m avbtool add_hash_footer \
          --partition_name recovery \
          --partition_size "$PART_SIZE" \
          --image "$PATCHED_IMAGE" \
          --key phh.pem \
          --algorithm SHA256_RSA4096; then
          echo "::error::Failed to add AVB hash footer"
          exit 1
        fi
        echo "✓ AVB hash footer added successfully"
        echo "::endgroup::"

    - name: Create release package
      run: |
        set -euo pipefail
        
        PATCHED_IMAGE="${{ env.PATCHED_IMAGE }}"
        OUTPUT_DIR="output"
        
        echo "::notice::Creating release package..."
        
        # Create output directory
        mkdir -p "$OUTPUT_DIR"
        
        # Copy patched image
        cp -f "$PATCHED_IMAGE" "$OUTPUT_DIR/recovery.img"
        
        # Create tar archive
        cd "$OUTPUT_DIR"
        tar -cvf fastbootd-recovery.tar recovery.img
        
        # Generate SHA256 checksum
        sha256sum fastbootd-recovery.tar > fastbootd-recovery.tar.sha256
        
        echo "::group::Release package created"
        ls -lh
        echo "::endgroup::"
        
        echo "::group::Checksums"
        cat fastbootd-recovery.tar.sha256
        echo "::endgroup::"

    - name: Secure cleanup temporary files
      if: always()
      run: |
        set -euo pipefail
        
        echo "::notice::Cleaning up temporary files..."
        
        # Securely remove large temporary files (3-pass overwrite)
        for file in recovery.img r-patched.img recovery-patched.img phh.pub.bin; do
          if [ -f "$file" ]; then
            shred -vfz -n 3 "$file" 2>/dev/null || rm -f "$file"
          fi
        done
        
        echo "::notice::✓ Temporary files securely cleaned"

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: output/fastbootd-recovery.tar*
        name: Patched-Recovery-${{ github.run_number }}
        tag_name: patched-recovery-${{ github.run_id }}
        body: |
          ## Recovery Image Build
          
          **Build Details:**
          - Run: ${{ github.run_number }}
          - Run ID: ${{ github.run_id }}
          - Commit: ${{ github.sha }}
          - Ref: ${{ github.ref }}
          - Build URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          **Input Parameters:**
          - Recovery URL: `${{ github.event.inputs.RECOVERY_URL }}`
          - Checksum: `${{ github.event.inputs.RECOVERY_CHECKSUM }}`
          
          **Files:**
          - `fastbootd-recovery.tar` — Recovery image archive
          - `fastbootd-recovery.tar.sha256` — SHA256 checksum
          
          **Verification:**
          To verify the downloaded archive:
          ```bash
          sha256sum -c fastbootd-recovery.tar.sha256
          ```
        draft: false
        prerelease: false

    - name: Upload Artifacts (Backup)
      uses: actions/upload-artifact@v4
      with:
        name: recovery-artifacts-${{ github.run_id }}
        path: output/
        retention-days: 30
        compression-level: 6

    - name: Workflow Summary
      if: success()
      run: |
        cat << 'EOF'
        
        ✅ Recovery image build completed successfully!
        
        📦 Artifacts uploaded to:
          - GitHub Releases
          - GitHub Artifacts (retention: 30 days)
        
        📋 Next steps:
          1. Download the release package
          2. Verify checksums: sha256sum -c fastbootd-recovery.tar.sha256
          3. Extract archive: tar -xvf fastbootd-recovery.tar
          4. Flash recovery: fastboot flash recovery recovery.img
        
        EOF

    - name: Error Summary
      if: failure()
      run: |
        cat << 'EOF'
        
        ❌ Recovery image build failed!
        
        📋 Troubleshooting steps:
          1. Review workflow logs for error details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          2. Verify RECOVERY_URL is accessible and valid
          3. Ensure script1.sh and script2.sh execute successfully
          4. Verify phh.pem certificate is valid and readable
          5. Check disk space: df -h
          6. Review file permissions and required dependencies
        
        ℹ️  For more information, review the full workflow logs.
        
        EOF
